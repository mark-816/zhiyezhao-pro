<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B4B8C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2A6BBF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FBBF24;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 圆角矩形背景 -- 墨羽蓝渐变 -->
  <rect x="20" y="20" width="360" height="360" rx="72" ry="72" fill="url(#bgGrad)"/>

  <!-- ===== 图标：人像轮廓（白色） ===== -->
  <!-- 头部 -->
  <circle cx="155" cy="145" r="38" fill="none" stroke="white" stroke-width="5.5" opacity="0.95"/>
  <!-- 身体 -->
  <path d="M88 290 C88 238, 155 210, 155 210 C155 210, 222 238, 222 290"
        fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round" opacity="0.95"/>

  <!-- ===== 图标：相机镜头（橙色） ===== -->
  <!-- 镜头外环 -->
  <circle cx="265" cy="162" r="38" fill="none" stroke="url(#circleGrad)" stroke-width="5.5"/>
  <!-- 镜片中圈 -->
  <circle cx="265" cy="162" r="22" fill="none" stroke="url(#circleGrad)" stroke-width="2.5"/>
  <!-- 镜片内圈 -->
  <circle cx="265" cy="162" r="9" fill="url(#circleGrad)" opacity="0.25"/>
  <!-- 镜头高光 -->
  <circle cx="273" cy="154" r="4" fill="white" opacity="0.5"/>
  <!-- 镜头中心点 -->
  <circle cx="265" cy="162" r="4" fill="url(#circleGrad)"/>

  <!-- ===== 品牌名称 ===== -->
  <!-- 职业照 -->
  <text x="200" y="333" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="56" font-weight="800" fill="white" text-anchor="middle" letter-spacing="8">
    职业照
  </text>

  <!-- Pro 橙色点缀 -->
  <text x="200" y="370" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif"
        font-size="40" font-weight="700" fill="#F59E0B" text-anchor="middle" letter-spacing="4">
    Pro
  </text>
</svg>
